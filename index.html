<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Bingo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            font-family: Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            display: flex;
            flex-direction: column;
        }

        /* ---------------- PAINEL SUPERIOR (GRID) ---------------- */
        .board {
            flex: 1;
            display: grid;
            grid-template-columns: 5vw repeat(15, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 6px;
            padding: 10px 10px 0 10px;
        }

        /* Cartão de Letra (B I N G O) */
        .letter-card {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 7vmin;
            font-weight: 900;
            color: #000;
        }

        /* Cartão de Número */
        .card {
            perspective: 1000px;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Visual da carta oculta (Fundo azul + Ícone centralizado) */
        .card-front {
            background-color: #3bb2fb; 
        }

        /* Estilo do ícone dentro da carta */
        .card-icon {
            max-width: 70%;
            max-height: 55%;
            object-fit: contain;
        }

        /* Visual da carta exposta (Fundo branco) */
        .card-back {
            background: #ffffff;
            color: #121212;
            transform: rotateY(180deg);
            font-size: 7vmin;
        }

        /* ---------------- RODAPÉ E HISTÓRICO ---------------- */
        .footer {
            height: 28vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
        }

        .history-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .history-circle {
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-family: Arial, sans-serif;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .history-circle.white {
            background-color: #ffffff;
            color: #000000;
            width: 13vh;
            height: 13vh;
            font-size: 6vh;
        }

        .history-circle.yellow {
            background-color: #fff000;
            color: #000000;
            width: 22vh;
            height: 22vh;
            font-size: 10vh;
        }

        .logo {
            max-height: 15vh;
            object-fit: contain;
        }

        /* ---------------- INDICADOR DE DIGITAÇÃO ---------------- */
        .typing-indicator {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: #e74c3c;
            color: #fff;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 28px;
            font-weight: bold;
            display: none;
            z-index: 1000;
            border: 3px solid #fff;
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.6);
            min-width: 70px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div id="board" class="board"></div>
    
    <div class="footer">
        <div id="history" class="history-container"></div>
        <img src="logo.png" alt="Logo Paróquia" class="logo">
    </div>

    <div id="typing-indicator" class="typing-indicator"></div>

    <script>
        const board = document.getElementById('board');
        const historyContainer = document.getElementById('history');
        const typingIndicator = document.getElementById('typing-indicator');
        let currentTyping = '';

        let flippedNumbers = JSON.parse(localStorage.getItem('bingoFlippedNumbers')) || [];

        const letters = ['B', 'I', 'N', 'G', 'O'];
        const letterColors = ['#5bd4ff', '#ff6b6b', '#4cd137', '#fbc531', '#e15f41'];

        function initBoard() {
            board.innerHTML = '';
            
            for (let row = 0; row < 5; row++) {
                const letterCell = document.createElement('div');
                letterCell.className = 'letter-card';
                letterCell.style.backgroundColor = letterColors[row];
                letterCell.innerText = letters[row];
                board.appendChild(letterCell);

                for (let col = 1; col <= 15; col++) {
                    const i = (row * 15) + col;
                    
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.id = `card-${i}`;

                    if (flippedNumbers.includes(i)) {
                        card.classList.add('flipped');
                    }

                    const cardInner = document.createElement('div');
                    cardInner.className = 'card-inner';

                    const cardFront = document.createElement('div');
                    cardFront.className = 'card-front';

                    // Insere o ícone de frente da carta dinamicamente
                    const cardIcon = document.createElement('img');
                    cardIcon.src = 'icon.png';
                    cardIcon.className = 'card-icon';
                    cardFront.appendChild(cardIcon);

                    const cardBack = document.createElement('div');
                    cardBack.className = 'card-back';
                    cardBack.innerText = i;

                    cardInner.appendChild(cardFront);
                    cardInner.appendChild(cardBack);
                    card.appendChild(cardInner);

                    card.addEventListener('click', () => {
                        if (card.classList.contains('flipped')) {
                            const primeiraEtapa = confirm(`Você deseja ocultar o número ${i} novamente?`);
                            if (primeiraEtapa) {
                                const segundaEtapa = confirm(`Tem certeza absoluta? O número ${i} voltará a ficar oculto no painel.`);
                                if (segundaEtapa) {
                                    card.classList.remove('flipped');
                                    flippedNumbers = flippedNumbers.filter(num => num !== i);
                                    updateState();
                                }
                            }
                        }
                    });

                    board.appendChild(card);
                }
            }
            renderHistory();
        }

        function flipCard(num) {
            const card = document.getElementById(`card-${num}`);
            if (card && !card.classList.contains('flipped')) {
                card.classList.add('flipped');

                if (!flippedNumbers.includes(num)) {
                    flippedNumbers.push(num);
                    updateState();
                }
            }
        }

        function updateState() {
            localStorage.setItem('bingoFlippedNumbers', JSON.stringify(flippedNumbers));
            renderHistory();
        }

        function renderHistory() {
            historyContainer.innerHTML = '';
            const lastNumbers = flippedNumbers.slice(-4);

            lastNumbers.forEach((num, index) => {
                const circle = document.createElement('div');
                circle.className = 'history-circle';
                circle.innerText = num;

                if (index === lastNumbers.length - 1) {
                    circle.classList.add('yellow');
                } else {
                    circle.classList.add('white');
                }

                historyContainer.appendChild(circle);
            });
        }

        function resetBingo() {
            flippedNumbers = [];
            updateState();
            document.querySelectorAll('.card').forEach(card => {
                card.classList.remove('flipped');
            });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') {
                if (currentTyping.length < 3) {
                    currentTyping += e.key;
                    updateIndicator();
                }
            } else if (e.key === 'Backspace') {
                currentTyping = currentTyping.slice(0, -1);
                updateIndicator();
            } else if (e.key === 'Enter' || e.key === 'NumpadEnter') {
                const num = parseInt(currentTyping, 10);
                if (num === 999) {
                    if (confirm("Deseja reiniciar o bingo e esconder TODOS os 75 números?")) {
                        resetBingo();
                    }
                } else if (num >= 1 && num <= 75) {
                    flipCard(num);
                }
                currentTyping = '';
                updateIndicator();
            } else if (e.key === 'Escape') {
                currentTyping = '';
                updateIndicator();
            }
        });

        function updateIndicator() {
            typingIndicator.innerText = currentTyping;
            typingIndicator.style.display = currentTyping.length > 0 ? 'block' : 'none';
        }

        initBoard();
    </script>
</body>

</html>
